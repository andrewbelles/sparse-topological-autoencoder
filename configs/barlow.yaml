# Copy to barlow.yaml to override the code defaults.
device: cuda
seed: 0
embedding_dims: [128, 256, 512, 1024]
augmentations: [a0, a1, a2, a3, a4]
batch_size: 128
num_workers: 4
epochs: 60
learning_rate: 0.0003
weight_decay: 0.0001
base_channels: 32
dropout: 0.0
projector_hidden_dim: 1024
projector_dim: 1024
barlow_lambda: 0.005
supcon:
  enabled: true
  weight: 0.1
  temperature: 0.1
augment:
  crop_frames: 256
  resize_scale: [0.85, 1.0]
  mixup_alpha: 0.2
  linear_fader_strength: 0.15
  time_mask_width: 24
  freq_mask_width: 8
